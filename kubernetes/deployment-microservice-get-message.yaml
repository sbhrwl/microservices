apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: sbhrwldocker/microservice-get-message:v1.0.0
          ports:
            - containerPort: 9999
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: NodePort
  selector:
    app: my-app
  ports:
    - port: 9999
      targetPort: 9999
      nodePort: 30080 # NodePort service so you can easily access the app at http://localhost:30080/message/generate
