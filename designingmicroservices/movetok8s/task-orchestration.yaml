apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-orchestration-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-orchestration
  template:
    metadata:
      labels:
        app: task-orchestration
    spec:
      containers:
      - name: task-orchestration
        image: your-dockerhub/taskorchestration:latest
        ports:
        - containerPort: 9082
        env:
        - name: SPRING_DATA_MONGODB_URI
          value: mongodb://host.docker.internal:27017/yourdb
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: host.docker.internal:9092
        - name: SERVER_PORT
          value: "9082"
---
apiVersion: v1
kind: Service
metadata:
  name: task-orchestration-service
spec:
  type: NodePort
  selector:
    app: task-orchestration
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 9082
      nodePort: 30082
